# Cloudflare Workers manifest for the Tensei-Othello Anthropic proxy.
#
# The Anthropic API key is set as a Worker secret at deploy time
# (see .github/workflows/proxy-deploy.yml). It is never bundled into
# the PWA or APK.

name = "tensei-othello-proxy"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# A workers.dev URL is enabled by default after the first deploy.
# Final URL pattern: https://tensei-othello-proxy.<your-subdomain>.workers.dev
workers_dev = true
