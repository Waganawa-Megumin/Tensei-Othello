name: Proxy Deploy

# Deploys proxy/ to Cloudflare Workers and (re)pushes the Anthropic API
# key as a Worker secret. The Cloudflare API token + account id +
# Anthropic API key all come from GitHub Secrets — nothing committed.

on:
  push:
    branches:
      - main
    paths:
      - 'proxy/**'
      - '.github/workflows/proxy-deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Worker
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: proxy
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: proxy/package-lock.json

      - name: Install proxy dependencies
        run: npm ci

      - name: Type check Worker
        run: npm run typecheck

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: proxy
          # Pushes ANTHROPIC_API_KEY as a Worker secret each deploy.
          # Idempotent — re-running just overwrites with the same value.
          secrets: |
            ANTHROPIC_API_KEY
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
