name: Test & Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  web:
    name: othello-game (Vite + Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: othello-game
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: othello-game/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build
