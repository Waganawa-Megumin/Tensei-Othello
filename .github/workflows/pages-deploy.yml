name: Pages Deploy

on:
  push:
    branches:
      - main
      - 'claude/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one active deploy at a time; cancel queued ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build PWA
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: othello-game
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: othello-game/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Add SPA fallback for GitHub Pages
        # Project pages serve from /Tensei-Othello/. A 404.html fallback
        # makes hard refreshes on any path return index.html, which the
        # client then handles. Harmless for our single-screen app, useful
        # if/when we add deep links.
        run: cp dist/index.html dist/404.html

      - name: Disable Jekyll
        # GitHub Pages tries to run Jekyll by default and ignores files
        # whose names start with an underscore. .nojekyll opts out.
        run: touch dist/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: othello-game/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
